<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周报</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/design-system.css">
    <style>
        .report-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl);
        }
    </style>
</head>
<body>
    <a href="/overview" class="back-btn">← 返回概览</a>
    
    <div class="container">
        <div class="report-container">
            <div class="date-selector">
                <label for="weekPicker">📅 选择周:</label>
                <input type="week" id="weekPicker" class="input" />
                <button class="btn btn-primary" onclick="loadReport()">查看周报</button>
            </div>
            <div id="reportDate" style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: var(--space-md);"></div>
            <div id="content">
                <div class="loading">加载周报...</div>
            </div>
        </div>
    </div>

    <script>
        // Initialize week picker with current week
        function initializeWeekPicker() {
            const now = new Date();
            const oneJan = new Date(now.getFullYear(), 0, 1);
            const numberOfDays = Math.floor((now - oneJan) / (24 * 60 * 60 * 1000));
            const weekNumber = Math.ceil((now.getDay() + 1 + numberOfDays) / 7);
            const weekStr = `${now.getFullYear()}-W${String(weekNumber).padStart(2, '0')}`;
            document.getElementById('weekPicker').value = weekStr;
        }

        async function loadReport() {
            const selectedWeek = document.getElementById('weekPicker').value;
            if (!selectedWeek) {
                document.getElementById('content').innerHTML = '<div class="error">请选择周</div>';
                return;
            }

            document.getElementById('content').innerHTML = '<div class="loading">加载周报...</div>';
            document.getElementById('reportDate').textContent = `查看周: ${selectedWeek}`;

            try {
                const response = await fetch(`/api/reports/weekly?week=${selectedWeek}`);
                if (response.ok) {
                    const markdown = await response.text();
                    // Use marked library for full Markdown support
                    const htmlContent = marked.parse(markdown);
                    document.getElementById('content').innerHTML = `<div class="markdown-body">${htmlContent}</div>`;
                } else {
                    document.getElementById('content').innerHTML = '<div class="error">该周暂无周报</div>';
                }
            } catch (e) {
                document.getElementById('content').innerHTML = '<div class="error">加载周报失败</div>';
            }
        }

        // Initialize on page load
        initializeWeekPicker();
        loadReport();
    </script>
</body>
</html>
