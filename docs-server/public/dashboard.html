<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人工作仪表板</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eaeaea;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .stat-card .icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .stat-card .label {
            color: #888;
            font-size: 0.9em;
        }
        
        .stat-card.total { border-left: 4px solid #667eea; }
        .stat-card.today { border-left: 4px solid #10b981; }
        .stat-card.streak { border-left: 4px solid #f59e0b; }
        .stat-card.level { border-left: 4px solid #e94560; }
        
        /* 等级区域 */
        .level-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .level-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .level-badge {
            font-size: 3em;
        }
        
        .level-details h2 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        
        .level-details .points {
            color: #888;
        }
        
        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        
        /* 贡献图 */
        .contributions-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .section-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .contributions-graph {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            justify-content: flex-start;
        }
        
        .contribution-cell {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: rgba(255,255,255,0.05);
        }
        
        .contribution-cell.level-1 { background: #0e4429; }
        .contribution-cell.level-2 { background: #006d32; }
        .contribution-cell.level-3 { background: #26a641; }
        .contribution-cell.level-4 { background: #39d353; }
        
        .contributions-legend {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            font-size: 0.85em;
            color: #888;
        }
        
        /* 图表区域 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-card h3 {
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .bar-label {
            width: 80px;
            font-size: 0.85em;
            color: #aaa;
        }
        
        .bar-track {
            flex: 1;
            height: 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 0.75em;
            color: #fff;
        }
        
        .bar-value {
            width: 40px;
            text-align: right;
            font-size: 0.85em;
            color: #888;
        }
        
        /* 最近提交 */
        .recent-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .commit-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .commit-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .commit-item:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .commit-hash {
            font-family: monospace;
            color: #667eea;
            font-size: 0.85em;
        }
        
        .commit-message {
            flex: 1;
            font-size: 0.9em;
        }
        
        .commit-project {
            font-size: 0.8em;
            color: #888;
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .commit-date {
            font-size: 0.8em;
            color: #666;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 刷新按钮 */
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
        }
        
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>个人工作仪表板</h1>
            <p class="subtitle">追踪你的开发进度与成就</p>
        </header>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载数据...</p>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="refreshData()" title="刷新数据">↻</button>
    </div>
    
    <script>
        let dashboardData = null;
        
        async function loadData() {
            try {
                const response = await fetch('/static/dashboard-data.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                dashboardData = await response.json();
                renderDashboard();
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="loading">
                        <p style="color: #e94560; font-size: 1.2em;">❌ 加载失败: ${error.message}</p>
                        <p style="margin-top: 20px; font-size: 0.95em; color: #aaa;">请按照以下步骤解决：</p>
                        <ol style="margin-top: 15px; text-align: left; max-width: 500px; margin: 20px auto; line-height: 2; color: #888;">
                            <li>打开 PowerShell，进入 tools 目录</li>
                            <li>运行命令：<code style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px;">cd d:\work\ai\lingma\.lingma\skills\tools</code></li>
                            <li>生成数据：<code style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px;">.\generate-dashboard-data.ps1</code></li>
                            <li>刷新本页面</li>
                        </ol>
                        <p style="margin-top: 20px;">
                            <button onclick="location.reload()" style="padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 1em;">🔄 刷新页面</button>
                        </p>
                    </div>
                `;
            }
        }
        
        function renderDashboard() {
            const data = dashboardData;
            const progressPercent = (data.level.points % 100);
            
            const html = `
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card total">
                        <div class="icon">📊</div>
                        <div class="value">${data.summary.totalCommits}</div>
                        <div class="label">总提交数</div>
                    </div>
                    <div class="stat-card today">
                        <div class="icon">📅</div>
                        <div class="value">${data.summary.todayCommits}</div>
                        <div class="label">今日提交</div>
                    </div>
                    <div class="stat-card streak">
                        <div class="icon">🔥</div>
                        <div class="value">${data.summary.currentStreak}</div>
                        <div class="label">连续天数</div>
                    </div>
                    <div class="stat-card level">
                        <div class="icon">⭐</div>
                        <div class="value">${data.summary.weekCommits}</div>
                        <div class="label">本周提交</div>
                    </div>
                </div>
                
                <!-- 等级信息 -->
                <div class="level-section">
                    <div class="level-info">
                        <div class="level-badge">🏆</div>
                        <div class="level-details">
                            <h2>${data.level.name}</h2>
                            <p class="points">${data.level.points} 积分 · ${data.level.achievements.unlocked}/${data.level.achievements.total} 成就</p>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progressPercent}%"></div>
                    </div>
                </div>
                
                <!-- 贡献图 -->
                <div class="contributions-section">
                    <h3 class="section-title">
                        <span>📈</span>
                        <span>贡献图</span>
                    </h3>
                    <div class="contributions-graph">
                        ${data.contributions.map(c => {
                            const level = c.count === 0 ? 0 : c.count === 1 ? 1 : c.count <= 3 ? 2 : c.count <= 5 ? 3 : 4;
                            return `<div class="contribution-cell level-${level}" title="${c.date}: ${c.count} 次提交"></div>`;
                        }).join('')}
                    </div>
                    <div class="contributions-legend">
                        <span>少</span>
                        <div class="contribution-cell level-1"></div>
                        <div class="contribution-cell level-2"></div>
                        <div class="contribution-cell level-3"></div>
                        <div class="contribution-cell level-4"></div>
                        <span>多</span>
                    </div>
                </div>
                
                <!-- 图表 -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>⏰ 时段分布</h3>
                        <div class="bar-chart">
                            ${renderHourlyChart(data.hourlyDistribution)}
                        </div>
                    </div>
                    <div class="chart-card">
                        <h3>📁 项目分布</h3>
                        <div class="bar-chart">
                            ${renderProjectChart(data.projectDistribution)}
                        </div>
                    </div>
                </div>
                
                <!-- 最近提交 -->
                <div class="recent-section">
                    <h3 class="section-title">
                        <span>📝</span>
                        <span>最近提交</span>
                    </h3>
                    <div class="commit-list">
                        ${data.recentCommits.map(c => `
                            <div class="commit-item">
                                <span class="commit-hash">${c.hash}</span>
                                <span class="commit-message">${escapeHtml(c.message)}</span>
                                <span class="commit-project">${c.project}</span>
                                <span class="commit-date">${c.date}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }
        
        function renderHourlyChart(hourly) {
            const max = Math.max(...Object.values(hourly));
            const hours = ['00', '04', '08', '12', '16', '20'];
            
            return hours.map(h => {
                const hNum = parseInt(h);
                const count = hourly[hNum] || 0;
                const percent = max > 0 ? (count / max) * 100 : 0;
                return `
                    <div class="bar-item">
                        <span class="bar-label">${h}:00</span>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${percent}%; background: linear-gradient(90deg, #667eea, #764ba2);"></div>
                        </div>
                        <span class="bar-value">${count}</span>
                    </div>
                `;
            }).join('');
        }
        
        function renderProjectChart(projects) {
            const sorted = Object.entries(projects).sort((a, b) => b[1] - a[1]).slice(0, 5);
            const max = sorted[0]?.[1] || 1;
            
            return sorted.map(([name, count]) => {
                const percent = (count / max) * 100;
                return `
                    <div class="bar-item">
                        <span class="bar-label">${name.substring(0, 8)}</span>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${percent}%; background: linear-gradient(90deg, #10b981, #059669);"></div>
                        </div>
                        <span class="bar-value">${count}</span>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            loadData().then(() => {
                setTimeout(() => btn.classList.remove('spinning'), 500);
            });
        }
        
        // 加载数据
        loadData();
    </script>
</body>
</html>
