<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目健康报告</title>
    <link rel="stylesheet" href="/static/design-system.css">
    <style>
        .report-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl);
        }
        .project-list { display: grid; gap: var(--space-md); }
        .project-item { 
            background: var(--bg-tertiary); 
            padding: var(--space-lg); 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border-subtle);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .project-name { font-weight: 700; color: var(--text-primary); }
        .project-score { font-size: 1.5rem; font-weight: 800; }
        .score-healthy { color: var(--accent-success); }
        .score-moderate { color: var(--accent-warning); }
        .score-atrisk { color: var(--accent-danger); }
    </style>
</head>
<body>
    <a href="/overview" class="back-btn">← 返回概览</a>
    
    <div class="container">
        <div class="report-container">
            <div id="content">
                <div class="loading">加载健康报告...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadReport() {
            try {
                const response = await fetch('/api/health-report.json');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('content').innerHTML = renderReport(data);
                } else {
                    document.getElementById('content').innerHTML = '<div class="error">暂无健康报告数据</div>';
                }
            } catch (e) {
                document.getElementById('content').innerHTML = '<div class="error">加载报告失败</div>';
            }
        }

        function renderReport(data) {
            if (!data.summary) return '<div class="empty">暂无数据，请运行 project-health-monitor.ps1 生成报告</div>';

            const s = data.summary;
            let html = `
                <div class="header">
                    <h1>💚 项目健康监控报告</h1>
                    <p>实时监控项目健康状态和预警</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card stat-healthy">
                        <div class="stat-value">${s.healthyCount || 0}</div>
                        <div class="stat-label">健康项目</div>
                    </div>
                    <div class="stat-card stat-moderate">
                        <div class="stat-value">${s.moderateCount || 0}</div>
                        <div class="stat-label">一般项目</div>
                    </div>
                    <div class="stat-card stat-atrisk">
                        <div class="stat-value">${(s.atRiskCount || 0) + (s.criticalCount || 0)}</div>
                        <div class="stat-label">风险项目</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <div class="stat-value">${s.totalProjects || 0}</div>
                        <div class="stat-label">总项目数</div>
                    </div>
                </div>
            `;

            if (data.projects && data.projects.length > 0) {
                html += `
                    <div class="section">
                        <h2>📋 项目状态详情</h2>
                        <div class="project-list">
                            ${data.projects.map(p => {
                                let scoreClass = 'score-healthy';
                                let statusText = '健康';
                                if (p.healthScore < 60) {
                                    scoreClass = 'score-atrisk';
                                    statusText = '风险';
                                } else if (p.healthScore < 80) {
                                    scoreClass = 'score-moderate';
                                    statusText = '一般';
                                }
                                return `
                                    <div class="project-item">
                                        <div>
                                            <div class="project-name">${p.project}</div>
                                            <div style="font-size:14px;color:#666;margin-top:4px;">状态：${statusText}</div>
                                        </div>
                                        <div class="project-score ${scoreClass}">${p.healthScore}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            return html;
        }

        loadReport();
    </script>
</body>
</html>
